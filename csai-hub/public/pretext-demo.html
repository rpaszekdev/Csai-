<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Pretext.js demo · text wraps around a draggable frame</title>
<link rel="stylesheet" href="/shared/lesson-shell.css" />
<link rel="stylesheet" href="/auto-sys/auto-sys.skin.css" />
<style>
  body { padding: 0 36px; }

  .demo-page {
    max-width: 1100px;
    margin: 0 auto;
    padding: 56px 0 120px;
  }

  .demo-eyebrow {
    font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--ink-mute); font-weight: 500; margin-bottom: 12px;
  }
  .demo-title {
    font-size: 18px; letter-spacing: 0.06em; text-transform: uppercase;
    font-weight: 600; line-height: 1.4; margin-bottom: 32px;
  }

  /* the prose container — text rendered as absolutely-positioned line spans
     by Pretext.js. position: relative so children anchor to it. */
  .pretext-prose {
    position: relative;
    font-family: "JetBrains Mono", "IBM Plex Mono", ui-monospace, monospace;
    color: var(--ink-soft);
    /* height set programmatically after layout */
  }
  .pretext-line {
    position: absolute;
    left: 0;
    white-space: pre;
    pointer-events: none;
  }

  /* the framed obstacle — drag this to see text reflow */
  .pretext-frame {
    position: absolute;
    width: 280px;
    height: 200px;
    border: 1px solid var(--ink-faint);
    background: var(--paper-2);
    box-shadow: 4px 4px 0 var(--ink);
    cursor: grab;
    user-select: none;
    display: flex;
    flex-direction: column;
    z-index: 10;
  }
  .pretext-frame.dragging { cursor: grabbing; }
  .pretext-frame-canvas {
    flex: 1;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink-mute);
    font-size: 10px; letter-spacing: 0.16em; text-transform: uppercase;
  }
  .pretext-frame-controls {
    border-top: 1px solid var(--ink-faint);
    padding: 8px 12px;
    font-size: 9px; letter-spacing: 0.16em; text-transform: uppercase;
    color: var(--ink-mute);
    background: var(--paper);
  }

  .demo-help {
    margin-top: 18px;
    font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ink-mute);
  }
  .demo-help kbd {
    display: inline-block;
    padding: 1px 6px;
    border: 1px solid var(--ink-faint);
    margin: 0 4px;
    color: var(--ink-soft);
  }
</style>
</head>
<body>
<div class="rust-bar"></div>

<header class="topbar">
  <a href="/" class="back">← Back</a>
  <span class="brand">
    <span class="mark"></span>
    <span class="name">Pretext.js Demo</span>
  </span>
  <span class="crumbs">
    <span>@chenglou/pretext</span>
    <span>v0.0.6</span>
  </span>
</header>

<div class="demo-page">
  <div class="demo-eyebrow">Demo · text wraps around a draggable obstacle</div>
  <div class="demo-title">Editorial engine pattern, in this codebase.</div>

  <div class="pretext-prose" id="prose">
    <div class="pretext-frame" id="frame" style="top: 80px; left: 600px;">
      <div class="pretext-frame-canvas">animation frame</div>
      <div class="pretext-frame-controls">▶ play · drag me</div>
    </div>
  </div>

  <div class="demo-help">drag the frame · text reflows live · zero DOM reads in layout</div>
</div>

<script type="module">
  import {
    prepareWithSegments,
    layoutNextLineRange,
    materializeLineRange,
  } from "https://unpkg.com/@chenglou/pretext@0.0.6/dist/layout.js";

  const TEXT = [
    "A perceptron takes inputs, multiplies each one by a weight, adds a bias, then passes the total through an activation function. The classic perceptron uses a step function: output 1 if the total is at or above zero, otherwise 0.",
    "",
    "The error — target minus output — tells us how to adjust the weights. This is the perceptron learning rule: for each weight, the update is the learning rate times the error times the input that weight was connected to. The bias updates the same way, just treat it as an input that's always 1.",
    "",
    "Press play. Each input pulses along its weight, they meet at sigma, then f squashes the total into an output. A perceptron is a linear classifier — its decision boundary is always a straight line in 2D, or a flat plane in higher dimensions. It is essentially the same idea as logistic regression.",
    "",
    "This entire body of text is rendered with Pretext.js. Each line is laid out by pure arithmetic. Drag the frame on the right and the text reflows around it instantly, because line-by-line we ask Pretext to fit text into whatever horizontal slice is available at that y-coordinate.",
  ].join("\n");

  const FONT = '14px "JetBrains Mono", "IBM Plex Mono", ui-monospace, monospace';
  const LINE_HEIGHT = 24;
  const FRAME_GUTTER = 14;

  const prose = document.getElementById("prose");
  const frame = document.getElementById("frame");

  const prepared = prepareWithSegments(TEXT, FONT);

  function relayout() {
    const containerRect = prose.getBoundingClientRect();
    const frameRect = frame.getBoundingClientRect();
    const containerWidth = prose.clientWidth;

    const frameTop = frameRect.top - containerRect.top;
    const frameBottom = frameTop + frame.offsetHeight;
    const frameLeft = frameRect.left - containerRect.left;
    const frameRight = frameLeft + frame.offsetWidth;

    // remove old line spans
    prose.querySelectorAll(".pretext-line").forEach((n) => n.remove());

    let cursor = { segmentIndex: 0, graphemeIndex: 0 };
    let y = 0;
    let safety = 0;
    while (safety++ < 2000) {
      const lineTop = y;
      const lineBottom = y + LINE_HEIGHT;

      // does this line collide with the frame on the y-axis?
      const collides = lineBottom > frameTop && lineTop < frameBottom;

      // determine available x-range. For simplicity v1: pick the LARGER of
      // (left of frame) vs (right of frame) as the line's slot. Both-sides
      // simultaneous flow is a v2 enhancement.
      let xStart = 0;
      let maxWidth = containerWidth;

      if (collides) {
        const leftSlot = frameLeft - FRAME_GUTTER;
        const rightSlot = containerWidth - frameRight - FRAME_GUTTER;
        if (leftSlot >= rightSlot) {
          xStart = 0;
          maxWidth = Math.max(40, leftSlot);
        } else {
          xStart = frameRight + FRAME_GUTTER;
          maxWidth = Math.max(40, rightSlot);
        }
      }

      const range = layoutNextLineRange(prepared, cursor, maxWidth);
      if (!range) break;

      const line = materializeLineRange(prepared, range);
      const span = document.createElement("div");
      span.className = "pretext-line";
      span.style.top = `${y}px`;
      span.style.left = `${xStart}px`;
      span.style.width = `${maxWidth}px`;
      span.style.height = `${LINE_HEIGHT}px`;
      span.style.lineHeight = `${LINE_HEIGHT}px`;
      span.style.font = FONT;
      span.textContent = line.text;
      prose.appendChild(span);

      // detect end of input
      if (
        range.end.segmentIndex === cursor.segmentIndex &&
        range.end.graphemeIndex === cursor.graphemeIndex
      ) {
        break;
      }
      cursor = range.end;
      y += LINE_HEIGHT;
    }

    prose.style.height = `${Math.max(y, frameBottom) + 32}px`;
  }

  // drag the frame
  let dragging = false;
  let dragOffsetX = 0;
  let dragOffsetY = 0;
  frame.addEventListener("pointerdown", (ev) => {
    dragging = true;
    frame.classList.add("dragging");
    const fr = frame.getBoundingClientRect();
    dragOffsetX = ev.clientX - fr.left;
    dragOffsetY = ev.clientY - fr.top;
    frame.setPointerCapture(ev.pointerId);
  });
  frame.addEventListener("pointermove", (ev) => {
    if (!dragging) return;
    const containerRect = prose.getBoundingClientRect();
    const x = ev.clientX - containerRect.left - dragOffsetX;
    const y = ev.clientY - containerRect.top - dragOffsetY;
    const maxX = prose.clientWidth - frame.offsetWidth;
    frame.style.left = `${Math.max(0, Math.min(maxX, x))}px`;
    frame.style.top = `${Math.max(0, y)}px`;
    relayout();
  });
  frame.addEventListener("pointerup", (ev) => {
    dragging = false;
    frame.classList.remove("dragging");
    frame.releasePointerCapture(ev.pointerId);
  });

  window.addEventListener("resize", relayout);
  relayout();
</script>
</body>
</html>
