<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Cosmos Capture</title>
    <style>
      :root { color-scheme: light dark; }
      body {
        font: 13px/1.45 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 14px 14px 12px;
        width: 260px;
      }
      h1 { font-size: 14px; margin: 0 0 10px; }
      label { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
      input[type="text"] {
        width: 100%;
        box-sizing: border-box;
        padding: 6px 8px;
        font: inherit;
        border-radius: 6px;
        border: 1px solid #8884;
      }
      .row { display: flex; justify-content: space-between; gap: 8px; margin-top: 10px; }
      button {
        flex: 1;
        padding: 6px 8px;
        font: inherit;
        border-radius: 6px;
        border: 1px solid #8884;
        background: #0001;
        cursor: pointer;
      }
      button.primary { background: #2563eb; color: #fff; border-color: #2563eb; }
      .stat { color: #888; font-size: 12px; margin-top: 8px; }
    </style>
  </head>
  <body>
    <h1>Cosmos Capture</h1>

    <label>
      <input type="checkbox" id="enabled" />
      Auto-save images
    </label>

    <label>
      <input type="checkbox" id="groupByPage" />
      Group by page title
    </label>

    <label style="display:block; margin-top:6px;">
      Folder
      <input type="text" id="folder" placeholder="cosmos-capture" />
    </label>

    <div class="row">
      <button id="rescan">Rescan page</button>
      <button id="reset" class="primary">Reset count</button>
    </div>

    <div class="stat">
      <div>On this page: <span id="pageCount">0</span></div>
      <div>Total saved: <span id="totalCount">0</span></div>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
